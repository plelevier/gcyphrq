name: Bump Version & Publish

on:
  push:
    branches: [main]

concurrency:
  group: version-bump
  cancel-in-progress: true

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTIONS_NODE_VERSION: 24
    # Skip the version bump commit itself (works for all merge strategies)
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
      id-token: write          # OIDC token for npm provenance
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          set -euo pipefail

          # Skip if HEAD is already tagged (prevents double-bump from race conditions)
          HEAD_TAG=$(git describe --exact-match --tags --match "v*" HEAD 2>/dev/null || echo "")
          if [ -n "$HEAD_TAG" ]; then
            echo "HEAD is already tagged as $HEAD_TAG, skipping bump"
            echo "version=${HEAD_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "bumped=true" >> "$GITHUB_OUTPUT"

          LAST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          # If package.json was manually edited in this batch, use the version as-is
          if git log --name-only --format="" "$RANGE" | grep -q "^package\.json$"; then
            VERSION=$(node -p "require('./package.json').version")
            echo "Using manually set version $VERSION"

            # Validate: tag must not already exist and version must be higher than last tag
            if git tag -l "v$VERSION" | grep -q .; then
              echo "Error: tag v$VERSION already exists"
              exit 1
            fi
            if [ -n "$LAST_TAG" ]; then
              LAST_VERSION=${LAST_TAG#v}
              if [ "$(printf '%s\n%s\n' "$LAST_VERSION" "$VERSION" | sort -V | head -n1)" = "$VERSION" ] && [ "$LAST_VERSION" != "$VERSION" ]; then
                echo "Error: version $VERSION is not higher than last release $LAST_VERSION"
                exit 1
              fi
            fi

            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            git tag "v$VERSION"
            git push origin main --tags
            exit 0
          fi

          # Determine version bump level based on conventional commits since last tag
          #   major  — commit subject with '!' (e.g. feat!: or feat(scope)!: …)
          #            or 'BREAKING CHANGE' footer in commit body
          #   minor  — commit subject starting with 'feat:' or 'feat('
          #   patch  — everything else
          LEVEL="patch"
          if git log --format="%B" "$RANGE" | grep -qE '^BREAKING CHANGE'; then
            LEVEL="major"
          elif git log --format="%s" "$RANGE" | grep -qE '^[a-z]+(\([^)]*\))?!:'; then
            LEVEL="major"
          elif git log --format="%s" "$RANGE" | grep -qE '^feat:|^feat\('; then
            LEVEL="minor"
          fi
          echo "Bumping $LEVEL (since $LAST_TAG)"
          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"
          NEW=$(npm --no-git-tag-version version "$LEVEL")
          # npm 10+ outputs with 'v' prefix — strip it for consistent handling
          VERSION=${NEW#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git add package.json
          git commit -m "chore: bump version to v$VERSION"
          git tag "v$VERSION"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.version.outputs.bumped == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true

      - run: npm ci
        if: steps.version.outputs.bumped == 'true'
      # prepublishOnly (build + test) runs automatically as part of npm publish
      - run: npm publish --provenance --access public
        if: steps.version.outputs.bumped == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
