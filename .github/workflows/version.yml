name: Bump Version & Publish

on:
  push:
    branches: [main]

concurrency:
  group: version-bump
  cancel-in-progress: true

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip the version bump commit itself (works for all merge strategies)
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
      id-token: write          # OIDC token for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: version
        run: |
          NEW=$(npm --no-git-tag-version version patch)
          # npm 10+ outputs with 'v' prefix — strip it for consistent handling
          VERSION=${NEW#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git add package.json
          git commit -m "chore: bump version to v$VERSION"
          git tag "v$VERSION"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true

      - run: npm ci
      # prepublishOnly (build + test) runs automatically as part of npm publish
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
