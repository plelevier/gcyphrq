<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  {% include head.html %}
</head>
<body>
  {% include nav.html %}
  <aside id="page-toc" class="page-toc" aria-label="Table of contents">
    <h5 class="page-toc__title">On this page</h5>
    <ul class="page-toc__list"></ul>
  </aside>
  <main class="content">
    <div class="container">
      {{ content }}
    </div>
  </main>
  {% include footer.html %}
  <script src="{{ '/assets/cypher-highlight.js' | relative_url }}"></script>
  <script src="{{ '/assets/heading-anchors.js' | relative_url }}"></script>
  <script src="{{ '/assets/page-toc.js' | relative_url }}"></script>
</body>
</html>
